<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Codebase Graph Explorer</title>
  <script src="https://unpkg.com/vis-network/standalone/umd/vis-network.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:       #0a0e1a;
      --surface:  #111827;
      --surface2: #1a2235;
      --border:   #1e2d45;
      --accent:   #4f8ef7;
      --green:    #34d399;
      --yellow:   #fbbf24;
      --red:      #f87171;
      --purple:   #a78bfa;
      --text:     #e2e8f0;
      --muted:    #64748b;
      --glow:     0 0 20px rgba(79,142,247,0.2);
    }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      color: var(--text);
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ── HEADER ── */
    header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 10px 18px;
      display: flex;
      align-items: center;
      gap: 12px;
      flex-shrink: 0;
      z-index: 20;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 0.9rem;
      font-weight: 700;
      color: var(--accent);
      white-space: nowrap;
      margin-right: 4px;
    }
    .brand-icon {
      width: 28px; height: 28px;
      background: linear-gradient(135deg, #4f8ef7, #7c3aed);
      border-radius: 7px;
      display: flex; align-items: center; justify-content: center;
      font-size: 14px;
    }

    #path-input {
      flex: 1;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 8px 14px;
      color: var(--text);
      font-size: 0.82rem;
      font-family: 'JetBrains Mono', monospace;
      outline: none;
      transition: border-color .2s, box-shadow .2s;
      min-width: 0;
    }
    #path-input:focus { border-color: var(--accent); box-shadow: var(--glow); }
    #path-input::placeholder { color: var(--muted); }

    #analyze-btn {
      display: flex; align-items: center; gap: 8px;
      padding: 8px 18px;
      background: linear-gradient(135deg, #4f8ef7, #6366f1);
      color: #fff;
      font-weight: 600;
      font-size: 0.82rem;
      border: none; border-radius: 8px;
      cursor: pointer; white-space: nowrap;
      transition: opacity .2s, transform .1s, box-shadow .2s;
      box-shadow: 0 2px 12px rgba(79,142,247,0.3);
    }
    #analyze-btn:hover:not(:disabled) { opacity: 0.88; box-shadow: 0 4px 20px rgba(79,142,247,0.45); }
    #analyze-btn:active:not(:disabled) { transform: scale(0.97); }
    #analyze-btn:disabled { opacity: 0.45; cursor: not-allowed; }

    .spinner {
      display: none; width: 13px; height: 13px;
      border: 2px solid rgba(255,255,255,0.3);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin .7s linear infinite;
    }
    #analyze-btn.loading .spinner  { display: block; }
    #analyze-btn.loading .btn-text { display: none; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── TOOLBAR STRIP ── */
    #toolbar {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 7px 18px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
      flex-wrap: wrap;
    }

    #status-text {
      font-size: 0.75rem;
      color: var(--muted);
      flex: 1;
      min-width: 200px;
      transition: color .25s;
    }
    #status-text.ok  { color: var(--green); }
    #status-text.err { color: var(--red); }
    #status-text.info{ color: var(--accent); }

    .tool-group {
      display: flex; align-items: center; gap: 4px;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 7px;
      padding: 3px;
    }

    .tool-btn {
      background: none; border: none;
      color: var(--muted); cursor: pointer;
      padding: 4px 10px;
      border-radius: 5px;
      font-size: 0.75rem;
      font-family: 'Inter', sans-serif;
      display: flex; align-items: center; gap: 5px;
      transition: background .15s, color .15s;
      white-space: nowrap;
    }
    .tool-btn:hover { background: var(--surface2); color: var(--text); }
    .tool-btn.active { background: var(--accent); color: #fff; }

    .sep { width: 1px; height: 18px; background: var(--border); margin: 0 2px; }

    /* ── LEGEND ── */
    #legend {
      display: flex; align-items: center; gap: 10px;
      flex-wrap: wrap;
    }
    .legend-item {
      display: flex; align-items: center; gap: 5px;
      font-size: 0.7rem; color: var(--muted);
    }
    .legend-dot {
      width: 10px; height: 10px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    /* ── MAIN ── */
    main {
      flex: 1;
      display: flex;
      overflow: hidden;
      position: relative;
    }

    #mynetwork {
      flex: 1;
      background: radial-gradient(ellipse at 50% 40%, #0e1929 0%, var(--bg) 75%);
    }

    /* ── EMPTY STATE ── */
    #empty-state {
      position: absolute; inset: 0;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 14px; color: var(--muted);
      pointer-events: none;
    }
    #empty-state .big-icon { font-size: 52px; opacity: 0.15; }
    #empty-state p  { font-size: 0.95rem; }
    #empty-state small { font-size: 0.76rem; opacity: .6; }

    /* ── SIDE PANEL ── */
    #side-panel {
      position: absolute; right: 0; top: 0; bottom: 0;
      width: 260px;
      background: var(--surface);
      border-left: 1px solid var(--border);
      padding: 16px;
      display: flex; flex-direction: column; gap: 12px;
      transform: translateX(110%);
      transition: transform .28s cubic-bezier(.4,0,.2,1);
      z-index: 10;
      overflow-y: auto;
    }
    #side-panel.open { transform: translateX(0); }

    .panel-title {
      font-size: 0.7rem; font-weight: 600;
      text-transform: uppercase; letter-spacing: .08em;
      color: var(--muted);
      display: flex; justify-content: space-between; align-items: center;
    }
    #close-panel {
      background: none; border: none; color: var(--muted);
      cursor: pointer; font-size: 14px; line-height: 1;
      padding: 2px 6px; border-radius: 4px;
    }
    #close-panel:hover { color: var(--text); background: var(--surface2); }

    .panel-badge {
      display: inline-flex; align-items: center;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 6px 10px;
      font-size: 0.83rem;
      font-family: 'JetBrains Mono', monospace;
      color: var(--text);
      word-break: break-all;
    }
    .panel-badge.name { color: var(--accent); font-weight: 600; font-size: 0.95rem; }

    .panel-row { display: flex; flex-direction: column; gap: 4px; }
    .panel-label {
      font-size: 0.65rem; font-weight: 600;
      text-transform: uppercase; letter-spacing: .07em;
      color: var(--muted);
    }

    /* ── STATS BAR ── */
    #stats-bar {
      display: none;
      position: absolute; bottom: 14px; left: 50%;
      transform: translateX(-50%);
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 6px 16px;
      display: none;
      align-items: center;
      gap: 20px;
      font-size: 0.72rem;
      color: var(--muted);
      box-shadow: 0 4px 20px rgba(0,0,0,0.4);
      z-index: 5;
    }
    #stats-bar.visible { display: flex; }
    .stat { display: flex; align-items: center; gap: 6px; }
    .stat strong { color: var(--text); font-size: 0.85rem; }
  </style>
</head>
<body>

<header>
  <div class="brand">
    <div class="brand-icon">🔭</div>
    Graph Explorer
  </div>
  <input id="path-input" type="text" placeholder="Paste project folder path…"/>
  <button id="analyze-btn">
    <div class="spinner"></div>
    <span class="btn-text">⚡ Analyze</span>
  </button>
</header>

<div id="toolbar">
  <span id="status-text">Enter a project path and click Analyze.</span>

  <div class="tool-group">
    <button class="tool-btn active" id="btn-hierarchy" title="Hierarchical top-down layout">↕ Hierarchy</button>
    <div class="sep"></div>
    <button class="tool-btn" id="btn-physics" title="Force-directed layout">⚛ Physics</button>
  </div>

  <div class="tool-group">
    <button class="tool-btn" id="btn-fit" title="Fit all nodes in view">⊡ Fit</button>
    <div class="sep"></div>
    <button class="tool-btn" id="btn-zoom-in">＋</button>
    <div class="sep"></div>
    <button class="tool-btn" id="btn-zoom-out">－</button>
  </div>

  <div id="legend"></div>
</div>

<main>
  <div id="empty-state">
    <div class="big-icon">🕸️</div>
    <p>No graph loaded yet</p>
    <small>Analyze a Python project to visualize the function call graph</small>
  </div>

  <div id="mynetwork"></div>

  <div id="side-panel">
    <div class="panel-title">
      Function Details
      <button id="close-panel">✕</button>
    </div>
    <div class="panel-row">
      <span class="panel-label">Name</span>
      <span class="panel-badge name" id="d-name">—</span>
    </div>
    <div class="panel-row">
      <span class="panel-label">File</span>
      <span class="panel-badge" id="d-file">—</span>
    </div>
    <div class="panel-row">
      <span class="panel-label">Line</span>
      <span class="panel-badge" id="d-line">—</span>
    </div>
    <div class="panel-row">
      <span class="panel-label">Author</span>
      <span class="panel-badge" id="d-author">—</span>
    </div>
    <div class="panel-row">
      <span class="panel-label">Color Group (File)</span>
      <span class="panel-badge" id="d-group">—</span>
    </div>
  </div>

  <div id="stats-bar">
    <div class="stat"><strong id="st-nodes">0</strong> functions</div>
    <div class="stat"><strong id="st-edges">0</strong> calls</div>
    <div class="stat"><strong id="st-files">0</strong> files</div>
  </div>
</main>

<script>
// ── Palette  (up to 12 distinct file colors) ──────────────────────────────
const PALETTE = [
  { bg: '#1d4ed8', border: '#60a5fa', highlight: '#3b82f6' },  // blue
  { bg: '#065f46', border: '#34d399', highlight: '#059669' },  // green
  { bg: '#7c2d12', border: '#fb923c', highlight: '#ea580c' },  // orange
  { bg: '#6b21a8', border: '#c084fc', highlight: '#9333ea' },  // purple
  { bg: '#be185d', border: '#f472b6', highlight: '#ec4899' },  // pink
  { bg: '#0e7490', border: '#22d3ee', highlight: '#0891b2' },  // cyan
  { bg: '#713f12', border: '#fbbf24', highlight: '#d97706' },  // amber
  { bg: '#1e3a5f', border: '#93c5fd', highlight: '#3b82f6' },  // sky
  { bg: '#14532d', border: '#86efac', highlight: '#16a34a' },  // lime
  { bg: '#4c1d95', border: '#ddd6fe', highlight: '#7c3aed' },  // violet
  { bg: '#881337', border: '#fda4af', highlight: '#e11d48' },  // rose
  { bg: '#1c4532', border: '#6ee7b7', highlight: '#059669' },  // teal
];

// ── State ─────────────────────────────────────────────────────────────────
let network     = null;
let layoutMode  = 'hierarchy'; // 'hierarchy' | 'physics'
let fileColorMap= {};           // filename → palette index

// ── DOM refs ─────────────────────────────────────────────────────────────
const btn         = document.getElementById('analyze-btn');
const pathInput   = document.getElementById('path-input');
const statusEl    = document.getElementById('status-text');
const emptyState  = document.getElementById('empty-state');
const sidePanel   = document.getElementById('side-panel');
const statsBar    = document.getElementById('stats-bar');
const legendEl    = document.getElementById('legend');
const btnHierarchy= document.getElementById('btn-hierarchy');
const btnPhysics  = document.getElementById('btn-physics');
const btnFit      = document.getElementById('btn-fit');
const btnZoomIn   = document.getElementById('btn-zoom-in');
const btnZoomOut  = document.getElementById('btn-zoom-out');
const closeBtn    = document.getElementById('close-panel');

// ── Helpers ───────────────────────────────────────────────────────────────
function setStatus(msg, cls = '') {
  statusEl.textContent = msg;
  statusEl.className   = cls;
}
function setLoading(on) {
  btn.disabled = on;
  btn.classList.toggle('loading', on);
}
function basename(p) { return p.replace(/\\/g, '/').split('/').pop(); }

// ── Analyze button ────────────────────────────────────────────────────────
btn.addEventListener('click', async () => {
  const path = pathInput.value.trim();
  if (!path) { setStatus('⚠ Please enter a folder path.', 'err'); return; }

  setLoading(true);
  setStatus('⏳ Extracting functions and building graph…', 'info');
  emptyState.style.display = 'none';
  statsBar.classList.remove('visible');

  try {
    const res  = await fetch('/api/analyze', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ path }),
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.error || 'Extraction failed');

    setStatus(`✅ Found ${data.functions} function(s) across ${data.files} file(s) — loading graph…`, 'ok');
    await loadGraph();
  } catch (e) {
    setStatus(`❌ ${e.message}`, 'err');
    emptyState.style.display = 'flex';
  } finally {
    setLoading(false);
  }
});

// ── Load graph data ───────────────────────────────────────────────────────
async function loadGraph() {
  const res  = await fetch('/api/graph');
  const data = await res.json();
  if (!res.ok) throw new Error(data.error || 'Failed to load graph');

  if (!data.nodes.length) {
    setStatus('No functions found. Check that the folder contains .py files.', 'err');
    emptyState.style.display = 'flex';
    return;
  }

  // Build file→color mapping
  fileColorMap = {};
  let colorIdx = 0;
  data.nodes.forEach(n => {
    const f = basename(n.file || '');
    if (f && !(f in fileColorMap)) {
      fileColorMap[f] = colorIdx++ % PALETTE.length;
    }
  });

  renderLegend();
  renderGraph(data.nodes, data.edges);

  document.getElementById('st-nodes').textContent = data.nodes.length;
  document.getElementById('st-edges').textContent = data.edges.length;
  document.getElementById('st-files').textContent = Object.keys(fileColorMap).length;
  statsBar.classList.add('visible');

  setStatus(
    `🗺 ${data.nodes.length} functions · ${data.edges.length} calls · ${Object.keys(fileColorMap).length} files — click a node for details`,
    'ok'
  );
}

// ── Legend ────────────────────────────────────────────────────────────────
function renderLegend() {
  legendEl.innerHTML = '';
  Object.entries(fileColorMap).forEach(([fname, idx]) => {
    const p     = PALETTE[idx];
    const item  = document.createElement('div');
    item.className = 'legend-item';
    item.innerHTML = `<span class="legend-dot" style="background:${p.border}"></span>${fname}`;
    legendEl.appendChild(item);
  });
}

// ── vis.js render ─────────────────────────────────────────────────────────
function renderGraph(nodes, edges) {
  if (network) { network.destroy(); network = null; }

  const visNodes = new vis.DataSet(nodes.map(n => {
    const fname = basename(n.file || '');
    const idx   = fileColorMap[fname] ?? 0;
    const pal   = PALETTE[idx];
    return {
      id:    n.id,
      label: n.label,
      title: `<b>${n.label}</b><br/>${fname}:${n.line}<br/>by ${n.author || '?'}`,
      shape: 'box',
      color: {
        background: pal.bg,
        border:     pal.border,
        highlight:  { background: pal.highlight, border: '#ffffff' },
        hover:      { background: pal.highlight, border: pal.border },
      },
      font: {
        color: '#e2e8f0', size: 13,
        face: 'JetBrains Mono, monospace',
        bold: { color: '#ffffff', size: 13 },
      },
      borderWidth: 1.5,
      borderWidthSelected: 3,
      shadow: { enabled: true, color: pal.border + '44', size: 10, x: 0, y: 3 },
      margin: { top: 8, bottom: 8, left: 12, right: 12 },
      _raw: n,
    };
  }));

  const visEdges = new vis.DataSet(edges.map((e, i) => ({
    id:     i,
    from:   e.from,
    to:     e.to,
    label:  '',   // keep edges clean — no label clutter
    arrows: { to: { enabled: true, scaleFactor: 0.65, type: 'arrow' } },
    color:  { color: '#1e3a5e', highlight: '#60a5fa', hover: '#60a5fa', opacity: 0.85 },
    width:  1.8,
    smooth: layoutMode === 'hierarchy'
      ? { enabled: false }
      : { type: 'dynamic' },
  })));

  const opts = buildOptions();
  const container = document.getElementById('mynetwork');
  network = new vis.Network(container, { nodes: visNodes, edges: visEdges }, opts);

  network.on('click', params => {
    if (params.nodes.length) {
      const n = visNodes.get(params.nodes[0]);
      openPanel(n._raw);
    } else {
      closePanel();
    }
  });

  network.on('stabilized', () => {
    network.fit({ animation: { duration: 600, easingFunction: 'easeInOutQuad' } });
  });
}

// ── Build vis options based on layoutMode ─────────────────────────────────
function buildOptions() {
  const base = {
    interaction: {
      hover: true, tooltipDelay: 150,
      zoomView: true, dragView: true, dragNodes: true,
      navigationButtons: false,
    },
    nodes: { chosen: true },
  };

  if (layoutMode === 'hierarchy') {
    return {
      ...base,
      layout: {
        hierarchical: {
          enabled: true,
          direction: 'UD',          // Up → Down
          sortMethod: 'directed',
          nodeSpacing: 160,
          levelSeparation: 110,
          treeSpacing: 200,
          blockShifting: true,
          edgeMinimization: true,
          parentCentralization: true,
        },
      },
      physics: { enabled: false },
    };
  }

  return {
    ...base,
    layout: { hierarchical: { enabled: false }, improvedLayout: true },
    physics: {
      enabled: true,
      solver: 'forceAtlas2Based',
      forceAtlas2Based: {
        gravitationalConstant: -60,
        centralGravity: 0.005,
        springLength: 180,
        springConstant: 0.05,
        damping: 0.5,
        avoidOverlap: 0.8,
      },
      stabilization: { iterations: 200 },
    },
  };
}

// ── Layout toggle ─────────────────────────────────────────────────────────
btnHierarchy.addEventListener('click', () => {
  if (layoutMode === 'hierarchy') return;
  layoutMode = 'hierarchy';
  btnHierarchy.classList.add('active');
  btnPhysics.classList.remove('active');
  if (network) { network.setOptions(buildOptions()); network.stabilize(); }
});

btnPhysics.addEventListener('click', () => {
  if (layoutMode === 'physics') return;
  layoutMode = 'physics';
  btnPhysics.classList.add('active');
  btnHierarchy.classList.remove('active');
  if (network) { network.setOptions(buildOptions()); }
});

// ── Zoom / Fit controls ───────────────────────────────────────────────────
btnFit.addEventListener('click',    () => network?.fit({ animation: true }));
btnZoomIn.addEventListener('click', () => network && network.moveTo({ scale: network.getScale() * 1.3, animation: true }));
btnZoomOut.addEventListener('click',() => network && network.moveTo({ scale: network.getScale() * 0.75, animation: true }));

// ── Side panel ────────────────────────────────────────────────────────────
function openPanel(raw) {
  const fname = basename(raw.file || '');
  const idx   = fileColorMap[fname] ?? 0;
  document.getElementById('d-name').textContent   = raw.label  || '—';
  document.getElementById('d-file').textContent   = fname      || '—';
  document.getElementById('d-line').textContent   = raw.line   || '—';
  document.getElementById('d-author').textContent = raw.author || '—';
  document.getElementById('d-group').textContent  = fname ? `${fname} (color ${idx + 1})` : '—';
  sidePanel.classList.add('open');
}
function closePanel() { sidePanel.classList.remove('open'); }
closeBtn.addEventListener('click', closePanel);
</script>
</body>
</html>
